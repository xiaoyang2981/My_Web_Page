<script>
fetch('../api/index.php?type=about').then(function(r){return r.json()}).then(function(d){
  if(!d)return;
  if(d.name)document.getElementById('aboutName').textContent=d.name;
  if(d.avatar)document.getElementById('aboutAvatar').src=d.avatar;
  if(d.sub)document.getElementById('aboutSub').textContent=d.sub;
  if(d.bio)document.getElementById('aboutBio').textContent=d.bio;
  if(d.skills)document.getElementById('aboutSkills').textContent=d.skills;
  if(d.exp)document.getElementById('aboutExp').textContent=d.exp;
}).catch(function(){});
</script>
