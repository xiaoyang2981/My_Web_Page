        <div id="ocList" class="fade-in" style="display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>
        <script>(function(){var e=document.getElementById('ocList');if(!e)return;var x=new XMLHttpRequest;x.open('GET','../api/index.php?type=oc');x.onload=function(){if(x.status!==200)return;var d=JSON.parse(x.responseText);d.forEach(function(r){var a=document.createElement('div');a.style.cssText='display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--bg-card);transition:all var(--transition)';a.innerHTML='<div style="width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-muted);flex-shrink:0;overflow:hidden">'+(r.a?'<img src="'+r.a+'" style="width:100%;height:100%;object-fit:cover">':(r.n?r.n.charAt(0):'?'))+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:var(--text-primary)">'+r.n+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:1px;white-space:pre-wrap">'+(r.d||'')+'</div></div>';e.appendChild(a)})};x.send()})();</script>
